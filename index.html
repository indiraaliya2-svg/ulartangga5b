<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petualangan Ular Tangga 30 - Edukatif</title>
    <style>
        :root {
            --primary-color: #4CAF50;
            --secondary-color: #FF9800;
            --bg-color: #E0F7FA;
            --text-color: #333;
            --correct-color: #8BC34A;
            --wrong-color: #EF5350;
            --p1-color: #f44336;
            --p2-color: #2196F3;
            --p3-color: #FFEB3B;
            --p4-color: #9C27B0;
            --p5-color: #FF5722;
        }

        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #game-container {
            display: flex;
            gap: 20px;
            max-width: 1100px;
            width: 100%;
        }

        /* PAPAN 30 KOTAK (6 Kolom x 5 Baris) */
        #board-container {
            position: relative;
            width: 500px;
            height: 420px;
            background-color: white;
            border: 8px solid #8D6E63;
            border-radius: 15px;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(5, 1fr);
        }

        .cell {
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            font-weight: bold;
        }

        .cell-number {
            position: absolute;
            top: 2px;
            left: 5px;
            font-size: 0.8em;
            color: #888;
        }

        /* SVG untuk Ular dan Tangga */
        #snakes-ladders-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .pion {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            border: 2px solid white;
            position: absolute;
            z-index: 10;
            transition: all 0.4s ease;
            transform: translate(-50%, -50%);
        }

        .pion-1 { background-color: var(--p1-color); }
        .pion-2 { background-color: var(--p2-color); }
        .pion-3 { background-color: var(--p3-color); }
        .pion-4 { background-color: var(--p4-color); }
        .pion-5 { background-color: var(--p5-color); }

        #control-panel {
            flex: 1;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        #dice {
            width: 60px; height: 60px;
            border: 3px solid #333;
            border-radius: 10px;
            display: flex; justify-content: center; align-items: center;
            font-size: 2em; margin: 10px auto;
        }

        /* MODAL SOAL */
        #quiz-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center; align-items: center;
            z-index: 100;
        }

        #quiz-container {
            background: white; padding: 30px; border-radius: 20px;
            text-align: center; max-width: 400px; width: 90%;
        }

        .option-btn {
            display: block; width: 100%; padding: 10px; margin: 5px 0;
            cursor: pointer; border-radius: 10px; border: 1px solid #ccc;
        }
        
        .correct { background-color: var(--correct-color) !important; color: white; }
        .wrong { background-color: var(--wrong-color) !important; color: white; }
    </style>
</head>
<body>

    <h1>🐍 Ular Tangga Edukatif (1-30) 🪜</h1>

    <div id="game-container">
        <div id="board-container" id="board">
            <svg id="snakes-ladders-svg"></svg>
        </div>

        <div id="control-panel">
            <div id="setup">
                <button id="start-btn" onclick="startGame()" style="padding: 15px 30px; font-size: 1.2em; cursor:pointer;">MULAI PERMAINAN</button>
                <p>Klik mulai untuk mengaktifkan musik & suara!</p>
            </div>

            <div id="play-area" style="display:none;">
                <div id="turn-info" style="padding:10px; text-align:center; color:white; font-weight:bold; border-radius:10px;">Pemain 1</div>
                <div id="dice">?</div>
                <button id="roll-btn" onclick="rollDice()" style="width:100%; padding:10px; cursor:pointer;">Lempar Dadu</button>
            </div>
        </div>
    </div>

    <!-- MODAL SOAL -->
    <div id="quiz-modal">
        <div id="quiz-container">
            <h3 id="q-text">Pertanyaan akan muncul di sini?</h3>
            <div id="options"></div>
        </div>
    </div>

    <!-- AUDIO ASSETS -->
    <!-- Catatan: Ganti URL ini dengan file suara asli Anda jika ingin offline -->
    <audio id="bgm" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
    <audio id="snd-ting" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
    <audio id="snd-tetot" src="https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3"></audio>

    <script>
        const totalCells = 30;
        const columns = 6;
        const players = [];
        let currentPlayer = 0;
        
        // Konfigurasi Ular & Tangga {dari: ke}
        const links = {
            3: 15,  // Tangga
            8: 20,  // Tangga
            17: 5,  // Ular
            24: 12, // Ular
            21: 29  // Tangga
        };

        const questions = [
            { q: "Berapa 5 + 5?", a: ["8", "10", "12"], c: 1 },
            { q: "Ibu membeli 3 apel, lalu beli lagi 2. Berapa jumlahnya?", a: ["5", "6", "4"], c: 0 },
            { q: "Ejaan angka 12 yang benar?", a: ["Dua belas", "Dua blas", "Sepuluh dua"], c: 0 },
            { q: "Simbol angka delapan?", a: ["7", "9", "8"], c: 2 }
        ];

        function createBoard() {
            const board = document.getElementById('board-container');
            for (let i = totalCells; i >= 1; i--) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerHTML = `<span class="cell-number">${i}</span>`;
                
                // Layout ular (boustrophedon)
                let row = Math.floor((totalCells - i) / columns);
                let col = (totalCells - i) % columns;
                cell.style.gridColumn = (row % 2 === 0) ? (columns - col) : (col + 1);
                
                cell.setAttribute('data-id', i);
                board.appendChild(cell);
            }
            drawLinks();
        }

        function drawLinks() {
            const svg = document.getElementById('snakes-ladders-svg');
            setTimeout(() => {
                for (let start in links) {
                    let end = links[start];
                    let startEl = document.querySelector(`[data-id="${start}"]`).getBoundingClientRect();
                    let endEl = document.querySelector(`[data-id="${end}"]`).getBoundingClientRect();
                    let boardEl = document.getElementById('board-container').getBoundingClientRect();

                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", startEl.left - boardEl.left + 40);
                    line.setAttribute("y1", startEl.top - boardEl.top + 40);
                    line.setAttribute("x2", endEl.left - boardEl.left + 40);
                    line.setAttribute("y2", endEl.top - boardEl.top + 40);
                    
                    if (end > start) {
                        line.setAttribute("stroke", "green"); // Tangga
                        line.setAttribute("stroke-width", "10");
                        line.setAttribute("stroke-dasharray", "4");
                    } else {
                        line.setAttribute("stroke", "red"); // Ular
                        line.setAttribute("stroke-width", "6");
                    }
                    svg.appendChild(line);
                }
            }, 500);
        }

        function startGame() {
            document.getElementById('bgm').play();
            document.getElementById('setup').style.display = 'none';
            document.getElementById('play-area').style.display = 'block';
            
            const colors = ['var(--p1-color)', 'var(--p2-color)', 'var(--p3-color)', 'var(--p4-color)', 'var(--p5-color)'];
            for (let i = 0; i < 5; i++) {
                players.push({ pos: 1, color: colors[i] });
                const pEl = document.createElement('div');
                pEl.className = `pion pion-${i+1}`;
                pEl.id = `pion-${i}`;
                document.getElementById('board-container').appendChild(pEl);
                updatePion(i);
            }
            updateTurnUI();
        }

        function updatePion(idx) {
            const p = players[idx];
            const cell = document.querySelector(`[data-id="${p.pos}"]`);
            const rect = cell.getBoundingClientRect();
            const boardRect = document.getElementById('board-container').getBoundingClientRect();
            const el = document.getElementById(`pion-${idx}`);
            
            el.style.left = (rect.left - boardRect.left + 40 + (idx * 5)) + 'px';
            el.style.top = (rect.top - boardRect.top + 40) + 'px';
        }

        function updateTurnUI() {
            const info = document.getElementById('turn-info');
            info.innerText = `Giliran Pemain ${currentPlayer + 1}`;
            info.style.backgroundColor = players[currentPlayer].color;
        }

        function rollDice() {
            const roll = Math.floor(Math.random() * 6) + 1;
            document.getElementById('dice').innerText = roll;
            
            let p = players[currentPlayer];
            p.pos += roll;
            if (p.pos > 30) p.pos = 30;
            
            updatePion(currentPlayer);
            
            setTimeout(() => showQuiz(), 600);
        }

        function showQuiz() {
            const q = questions[Math.floor(Math.random() * questions.length)];
            const modal = document.getElementById('quiz-modal');
            const qText = document.getElementById('q-text');
            const options = document.getElementById('options');
            
            qText.innerText = q.q;
            options.innerHTML = '';
            
            q.a.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(i, q.c, btn);
                options.appendChild(btn);
            });
            
            modal.style.display = 'flex';
        }

        function checkAnswer(chosen, correct, btn) {
            const ting = document.getElementById('snd-ting');
            const tetot = document.getElementById('snd-tetot');
            
            if (chosen === correct) {
                ting.play();
                btn.classList.add('correct');
                // Cek Ular/Tangga
                if (links[players[currentPlayer].pos]) {
                    players[currentPlayer].pos = links[players[currentPlayer].pos];
                }
            } else {
                tetot.play();
                btn.classList.add('wrong');
                // Penalti: Mundur 2 langkah jika salah
                players[currentPlayer].pos = Math.max(1, players[currentPlayer].pos - 2);
            }

            setTimeout(() => {
                document.getElementById('quiz-modal').style.display = 'none';
                updatePion(currentPlayer);
                if (players[currentPlayer].pos >= 30) {
                    alert(`Pemain ${currentPlayer + 1} MENANG!`);
                    location.reload();
                } else {
                    currentPlayer = (currentPlayer + 1) % 5;
                    updateTurnUI();
                }
            }, 1000);
        }

        createBoard();
    </script>
</body>
</html>
