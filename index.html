<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ular Tangga Golongan Hewan</title>
    <style>
        :root {
            --wood-dark: #8D6E63;
            --forest-green: #2E7D32;
            --sky-blue: #81D4FA;
            --correct-sound: #4CAF50;
            --wrong-sound: #F44336;
        }

        body {
            font-family: 'Arial Round', 'Trebuchet MS', sans-serif;
            background: linear-gradient(to bottom, #81D4FA, #C8E6C9);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #game-wrapper {
            background: url('https://img.freepik.com/free-vector/nature-forest-landscape-background_1308-72530.jpg?size=626&ext=jpg') no-repeat center center;
            background-size: cover;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            border: 10px solid var(--wood-dark);
            position: relative;
        }

        /* PAPAN PERMAINAN 1-50 */
        #board-container {
            display: grid;
            grid-template-columns: repeat(10, 60px);
            grid-template-rows: repeat(5, 60px);
            gap: 2px;
            background: rgba(255,255,255,0.2);
            padding: 10px;
            border-radius: 10px;
            position: relative;
        }

        .cell {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2em;
            color: white;
            text-shadow: 1px 1px 2px black;
            border-radius: 8px;
            position: relative;
        }

        /* Warna sel selang-seling seperti gambar */
        .cell:nth-child(odd) { background-color: #FFB74D; }
        .cell:nth-child(even) { background-color: #4FC3F7; }

        /* SVG Overlay untuk Ular & Tangga */
        #svg-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .pion {
            width: 35px;
            height: 35px;
            position: absolute;
            z-index: 10;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.5));
        }

        /* PANEL KONTROL */
        #side-panel {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.8);
            padding: 15px;
            border-radius: 15px;
        }

        #dice-box {
            width: 80px; height: 80px;
            background: white;
            border: 4px solid var(--wood-dark);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5em; cursor: pointer;
        }

        /* MODAL KUIS (Gaya Pop-up Gambar) */
        #quiz-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center; align-items: center;
            z-index: 100;
        }

        #quiz-content {
            background: #FFF9C4;
            padding: 30px;
            border-radius: 25px;
            text-align: center;
            max-width: 500px;
            border: 8px solid #FBC02D;
        }

        .animal-img {
            width: 200px; height: 150px;
            border-radius: 15px;
            object-fit: cover;
            margin-bottom: 15px;
            border: 4px solid white;
        }

        .opt-btn {
            display: inline-block;
            margin: 10px;
            padding: 12px 25px;
            font-size: 1em;
            font-weight: bold;
            text-transform: uppercase;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            color: white;
            transition: transform 0.2s;
        }

        .opt-btn:hover { transform: scale(1.1); }
        .btn-herbivora { background-color: #4CAF50; }
        .btn-karnivora { background-color: #F44336; }
        .btn-omnivora { background-color: #2196F3; }

    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="board-container" id="board">
        <svg id="svg-overlay"></svg>
    </div>

    <div id="side-panel">
        <div style="text-align: center;">
            <p id="player-label" style="font-weight: bold; margin-top: 0;">Giliran: Pemain 1</p>
            <div id="dice-box" onclick="rollDice()">🎲</div>
        </div>
        <div id="avatar-display">
            <img src="https://cdn-icons-png.flaticon.com/512/4333/4333609.png" width="80" alt="avatar">
        </div>
    </div>
</div>

<!-- Modal Kuis -->
<div id="quiz-modal">
    <div id="quiz-content">
        <h2 id="q-title">Pertanyaan!</h2>
        <img id="q-image" class="animal-img" src="" alt="animal">
        <p id="q-text" style="font-size: 1.2em; font-weight: bold;"></p>
        <div id="options">
            <button class="opt-btn btn-herbivora" onclick="answer('Herbivora')">Herbivora</button>
            <button class="opt-btn btn-karnivora" onclick="answer('Karnivora')">Karnivora</button>
            <button class="opt-btn btn-omnivora" onclick="answer('Omnivora')">Omnivora</button>
        </div>
    </div>
</div>

<!-- Sound Effects -->
<audio id="sfx-correct" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
<audio id="sfx-wrong" src="https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3"></audio>
<audio id="sfx-slide" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

<script>
    const totalCells = 50;
    const cols = 10;
    let playerPos = 1;

    // Data Ular & Tangga {dari: ke}
    const links = {
        3: 17, 10: 12, 18: 38, // Tangga
        15: 5, 24: 1, 48: 32   // Ular
    };

    // Bank Soal Hewan
    const questions = [
        { name: "Sapi", type: "Herbivora", img: "https://t3.ftcdn.net/jpg/02/10/73/04/360_F_210730419_3SNoK3mY3A932Ea88T0C9oF79yXzX5N9.jpg" },
        { name: "Harimau", type: "Karnivora", img: "https://images.unsplash.com/photo-1508249400262-10878544e331?ixlib=rb-1.2.1&auto=format&fit=crop&w=400&q=60" },
        { name: "Monyet", type: "Omnivora", img: "https://images.unsplash.com/photo-1540573133985-87b6da6d54a9?ixlib=rb-1.2.1&auto=format&fit=crop&w=400&q=60" },
        { name: "Singa", type: "Karnivora", img: "https://images.unsplash.com/photo-1546182990-dffeafbe841d?ixlib=rb-1.2.1&auto=format&fit=crop&w=400&q=60" },
        { name: "Kelinci", type: "Herbivora", img: "https://images.unsplash.com/photo-1585110396000-c9ffd4e4b308?ixlib=rb-1.2.1&auto=format&fit=crop&w=400&q=60" }
    ];

    let currentQ = {};

    function createBoard() {
        const board = document.getElementById('board-container');
        // Membuat urutan angka berkelok (boustrophedon)
        for (let row = 4; row >= 0; row--) {
            for (let col = 0; col < 10; col++) {
                let cellId;
                if (row % 2 === 0) {
                    cellId = (row * 10) + (col + 1);
                } else {
                    cellId = (row * 10) + (10 - col);
                }
                
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `cell-${cellId}`;
                cell.innerText = cellId;
                board.appendChild(cell);
            }
        }
        
        // Tambah Pion
        const pion = document.createElement('img');
        pion.id = 'player-pion';
        pion.className = 'pion';
        pion.src = 'https://cdn-icons-png.flaticon.com/512/4333/4333609.png';
        document.getElementById('board-container').appendChild(pion);
        updatePionPosition();
        drawLines();
    }

    function updatePionPosition() {
        const cell = document.getElementById(`cell-${playerPos}`);
        const pion = document.getElementById('player-pion');
        const boardRect = document.getElementById('board-container').getBoundingClientRect();
        const cellRect = cell.getBoundingClientRect();

        pion.style.left = (cellRect.left - boardRect.left + 12) + 'px';
        pion.style.top = (cellRect.top - boardRect.top + 12) + 'px';
    }

    function rollDice() {
        const roll = Math.floor(Math.random() * 6) + 1;
        document.getElementById('dice-box').innerText = roll;
        
        playerPos += roll;
        if (playerPos > 50) playerPos = 50;
        
        updatePionPosition();
        setTimeout(triggerQuiz, 600);
    }

    function triggerQuiz() {
        currentQ = questions[Math.floor(Math.random() * questions.length)];
        document.getElementById('q-image').src = currentQ.img;
        document.getElementById('q-text').innerText = `${currentQ.name} termasuk golongan hewan apa?`;
        document.getElementById('quiz-modal').style.display = 'flex';
    }

    function answer(choice) {
        const modal = document.getElementById('quiz-modal');
        const sfxCorrect = document.getElementById('sfx-correct');
        const sfxWrong = document.getElementById('sfx-wrong');
        const sfxSlide = document.getElementById('sfx-slide');

        if (choice === currentQ.type) {
            sfxCorrect.play();
            alert("BENAR! Lanjut bermain.");
            
            // Cek Ular atau Tangga
            if (links[playerPos]) {
                setTimeout(() => {
                    sfxSlide.play();
                    playerPos = links[playerPos];
                    updatePionPosition();
                }, 500);
            }
        } else {
            sfxWrong.play();
            alert(`SALAH! ${currentQ.name} adalah ${currentQ.type}. Kamu mundur 2 kotak.`);
            playerPos = Math.max(1, playerPos - 2);
            updatePionPosition();
        }

        modal.style.display = 'none';
        if (playerPos >= 50) {
            alert("SELAMAT! Kamu Menang!");
            playerPos = 1;
            updatePionPosition();
        }
    }

    // Menggambar garis ular/tangga (Sederhana)
    function drawLines() {
        const svg = document.getElementById('svg-overlay');
        const board = document.getElementById('board-container').getBoundingClientRect();
        
        Object.entries(links).forEach(([start, end]) => {
            const startCell = document.getElementById(`cell-${start}`).getBoundingClientRect();
            const endCell = document.getElementById(`cell-${end}`).getBoundingClientRect();
            
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", startCell.left - board.left + 30);
            line.setAttribute("y1", startCell.top - board.top + 30);
            line.setAttribute("x2", endCell.left - board.left + 30);
            line.setAttribute("y2", endCell.top - board.top + 30);
            line.setAttribute("stroke", (end > start) ? "rgba(76, 175, 80, 0.6)" : "rgba(244, 67, 54, 0.6)");
            line.setAttribute("stroke-width", "8");
            line.setAttribute("stroke-linecap", "round");
            svg.appendChild(line);
        });
    }

    window.onload = createBoard;
</script>

</body>
</html>
