<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ular Tangga Edukatif SD</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>

  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&amp;family=Nunito:wght@400;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
html,body{margin:0;padding:0;height:100%;width:100%;overflow:auto;font-family:'Nunito',sans-serif}
.game-wrap{width:100%;min-height:100%;background:linear-gradient(135deg,#ffecd2 0%,#fcb69f 50%,#ff9a9e 100%)}
h1,h2,h3,.fredoka{font-family:'Fredoka One',cursive}
.board-cell{position:relative;width:100%;aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:clamp(10px,1.8vw,18px);transition:all .2s;cursor:default;border:2px solid rgba(255,255,255,.4);box-shadow:inset 0 -2px 4px rgba(0,0,0,.1)}
.board-cell:hover{transform:scale(1.05);z-index:2}
.cell-snake{background:linear-gradient(135deg,#ff6b6b,#ee5a24)!important;color:#fff}
.cell-ladder{background:linear-gradient(135deg,#2ecc71,#27ae60)!important;color:#fff}
.cell-start{background:linear-gradient(135deg,#f9ca24,#f0932b)!important;color:#fff}
.cell-finish{background:linear-gradient(135deg,#6c5ce7,#a29bfe)!important;color:#fff;animation:pulse-finish 1.5s infinite}
@keyframes pulse-finish{0%,100%{box-shadow:0 0 0 0 rgba(108,92,231,.5)}50%{box-shadow:0 0 0 8px rgba(108,92,231,0)}}
.pion{width:clamp(14px,2vw,24px);height:clamp(14px,2vw,24px);border-radius:50%;position:absolute;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3);transition:all .3s ease;z-index:10;display:flex;align-items:center;justify-content:center;font-size:clamp(8px,1vw,12px)}
.pion.active-pion{animation:bounce-pion .5s infinite}
@keyframes bounce-pion{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.dice-container{width:80px;height:80px;perspective:600px;margin:0 auto}
.dice{width:80px;height:80px;background:#fff;border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:36px;color:#e74c3c;box-shadow:0 6px 20px rgba(0,0,0,.2);cursor:pointer;transition:transform .1s;user-select:none}
.dice:hover{transform:scale(1.05)}
.dice:active{transform:scale(.95)}
.dice.rolling{animation:roll-dice .6s ease-out}
@keyframes roll-dice{0%{transform:rotateX(0) rotateY(0) scale(1)}25%{transform:rotateX(180deg) rotateY(90deg) scale(.8)}50%{transform:rotateX(360deg) rotateY(180deg) scale(1.1)}75%{transform:rotateX(540deg) rotateY(270deg) scale(.9)}100%{transform:rotateX(720deg) rotateY(360deg) scale(1)}}
.score-card{background:rgba(255,255,255,.9);border-radius:12px;padding:8px 12px;display:flex;align-items:center;gap:8px;box-shadow:0 2px 8px rgba(0,0,0,.1);transition:all .3s}
.score-card.active-player{transform:scale(1.05);box-shadow:0 4px 16px rgba(0,0,0,.2);border:2px solid currentColor}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal-box{background:#fff;border-radius:20px;padding:24px;max-width:420px;width:90%;text-align:center;transform:scale(.8);transition:transform .3s;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-overlay.show .modal-box{transform:scale(1)}
.btn-answer{padding:10px 16px;border-radius:12px;font-weight:700;font-size:15px;border:3px solid #ddd;background:#fff;cursor:pointer;transition:all .2s;width:100%;text-align:left}
.btn-answer:hover{border-color:#3498db;background:#ebf5fb}
.btn-answer.correct{border-color:#2ecc71;background:#d5f5e3;animation:pop .3s}
.btn-answer.wrong{border-color:#e74c3c;background:#fadbd8;animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
.stars{position:fixed;pointer-events:none;z-index:200}
.star-particle{position:absolute;font-size:24px;animation:star-fly 1s ease-out forwards}
@keyframes star-fly{0%{opacity:1;transform:translate(0,0) scale(1) rotate(0)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0) rotate(360deg)}}
.snake-icon,.ladder-icon{font-size:clamp(10px,1.4vw,16px);position:absolute;bottom:1px;right:2px}
.input-answer{width:100%;padding:10px 14px;border:3px solid #ddd;border-radius:12px;font-size:16px;font-family:'Nunito',sans-serif;font-weight:600;outline:none;transition:border-color .2s}
.input-answer:focus{border-color:#3498db}
.reading-box{background:#f0f7ff;border-radius:12px;padding:12px;margin-bottom:12px;text-align:left;font-size:14px;line-height:1.6;border-left:4px solid #3498db}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:12px;font-weight:700;font-size:16px;z-index:300;opacity:0;transition:all .4s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.arrow-svg{position:absolute;z-index:5;pointer-events:none}
</style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div class="game-wrap" id="gameWrap"><!-- TITLE -->
   <div class="text-center pt-4 pb-2 px-4">
    <h1 id="gameTitle" class="text-2xl md:text-4xl text-white drop-shadow-lg" style="text-shadow:2px 2px 0 #e74c3c,4px 4px 0 rgba(0,0,0,.15)">🎮 Ular Tangga Edukatif 🎮</h1>
    <p class="text-white font-bold text-sm mt-1 opacity-80">Belajar sambil bermain untuk siswa SD!</p>
   </div><!-- MAIN LAYOUT -->
   <div class="flex flex-col lg:flex-row gap-4 px-4 pb-4 max-w-7xl mx-auto"><!-- LEFT: Board -->
    <div class="flex-1 min-w-0">
     <div class="relative">
      <div id="board" class="grid grid-cols-6 gap-1 p-3 bg-white/30 rounded-2xl backdrop-blur-sm" style="max-width:560px;margin:0 auto"></div>
      <svg id="arrowsSvg" class="absolute inset-0 w-full h-full pointer-events-none" style="z-index:5"></svg>
     </div>
    </div><!-- RIGHT: Controls -->
    <div class="lg:w-72 flex flex-col gap-3"><!-- Dice -->
     <div class="bg-white/80 rounded-2xl p-4 text-center backdrop-blur-sm shadow-lg">
      <p id="turnLabel" class="fredoka text-lg mb-2">Giliran: Pemain 1</p>
      <div class="dice-container">
       <div class="dice" id="diceBtn" onclick="rollDice()">
        🎲
       </div>
      </div>
      <p id="diceResult" class="mt-2 font-bold text-gray-500 text-sm">Klik dadu untuk mulai!</p>
     </div><!-- Scores -->
     <div class="bg-white/80 rounded-2xl p-3 backdrop-blur-sm shadow-lg">
      <h3 class="fredoka text-center mb-2 text-gray-700">⭐ Skor</h3>
      <div id="scoreBoard" class="flex flex-col gap-2"></div>
     </div><!-- Sound Toggle --> <button onclick="toggleSound()" id="soundBtn" class="bg-white/80 rounded-xl p-2 text-center font-bold text-sm shadow hover:bg-white transition">🔊 Musik: ON</button>
    </div>
   </div>
  </div><!-- Question Modal -->
  <div class="modal-overlay" id="questionModal">
   <div class="modal-box" id="questionBox"></div>
  </div><!-- Finish Modal -->
  <div class="modal-overlay" id="finishModal">
   <div class="modal-box">
    <h2 class="fredoka text-3xl mb-4">🏁 Permainan Selesai!</h2>
    <div id="finalScores"></div><button onclick="restartGame()" class="mt-4 bg-gradient-to-r from-purple-500 to-pink-500 text-white fredoka text-xl px-8 py-3 rounded-2xl shadow-lg hover:scale-105 transition">🔄 Main Lagi!</button>
   </div>
  </div><!-- Toast -->
  <div class="toast" id="toast"></div><!-- Stars container -->
  <div class="stars" id="starsContainer"></div>
  <script>
// ===== AUDIO via Web Audio API =====
const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
let soundOn=true;
function playTone(freq,dur,type='sine',vol=.15){
if(!soundOn)return;
try{audioCtx.resume()}catch(e){}
const o=audioCtx.createOscillator(),g=audioCtx.createGain();
o.type=type;o.frequency.value=freq;g.gain.value=vol;
o.connect(g);g.connect(audioCtx.destination);
o.start();g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
o.stop(audioCtx.currentTime+dur);
}
function sfxDice(){playTone(300,.08,'square',.1);setTimeout(()=>playTone(400,.08,'square',.1),80);setTimeout(()=>playTone(500,.08,'square',.1),160)}
function sfxStep(){playTone(600,.06,'sine',.08)}
function sfxCorrect(){playTone(523,.1,'sine',.12);setTimeout(()=>playTone(659,.1,'sine',.12),100);setTimeout(()=>playTone(784,.2,'sine',.12),200)}
function sfxWrong(){playTone(200,.15,'sawtooth',.1);setTimeout(()=>playTone(150,.2,'sawtooth',.1),150)}
function sfxLadder(){[523,587,659,698,784].forEach((f,i)=>setTimeout(()=>playTone(f,.12,'sine',.1),i*80))}
function sfxSnake(){[784,698,659,587,523,440].forEach((f,i)=>setTimeout(()=>playTone(f,.1,'sawtooth',.08),i*70))}
function sfxFinish(){const notes=[523,659,784,1047];notes.forEach((f,i)=>setTimeout(()=>playTone(f,.3,'sine',.15),i*150));setTimeout(()=>{[1047,1175,1319].forEach((f,i)=>setTimeout(()=>playTone(f,.4,'sine',.12),i*120))},700)}

// Background music
let bgInterval=null;
function startBgMusic(){
if(bgInterval)return;
const melody=[392,440,494,523,494,440,392,349,330,349,392,440,392,330,294,330];
let idx=0;
bgInterval=setInterval(()=>{
if(!soundOn)return;
playTone(melody[idx%melody.length],.2,'triangle',.04);
idx++;
},350);
}
function stopBgMusic(){clearInterval(bgInterval);bgInterval=null}
function toggleSound(){
soundOn=!soundOn;
document.getElementById('soundBtn').textContent=soundOn?'🔊 Musik: ON':'🔇 Musik: OFF';
if(soundOn)startBgMusic();else stopBgMusic();
}

// ===== GAME CONFIG =====
const TOTAL=30, PLAYERS=5;
const COLORS=['#e74c3c','#3498db','#f39c12','#2ecc71','#9b59b6'];
const NAMES=['Merah','Biru','Kuning','Hijau','Ungu'];
const EMOJIS=['🦊','🐬','🌟','🐸','🦄'];

// Snakes & Ladders
const SNAKES={27:8, 21:4, 17:3, 24:14};
const LADDERS={2:12, 6:16, 11:22, 15:25};

// Cell colors
const CELL_COLORS=['#ffeaa7','#dfe6e9','#fdcb6e','#81ecec','#fab1a0','#74b9ff','#a29bfe','#55efc4','#ff7675','#fd79a8'];

// ===== QUESTIONS BANK =====
const mcQuestions=[
{q:"Berat semangka itu …",opts:["delapan kilogram","8 kilogram"],ans:1},
{q:"Harga buku tulis itu …",opts:["Rp5.000,00","lima ribu rupiah"],ans:0},
{q:"Alamat rumah Siti di …",opts:["Jalan Mawar nomor sembilan","Jalan Mawar No. 9"],ans:1},
{q:"Panjang meja itu …",opts:["dua meter","2 meter"],ans:1},
{q:"Dana pembangunan taman sebesar …",opts:["300 juta rupiah","tiga ratus juta rupiah"],ans:0},
];
const tfQuestions=[
{q:"Rp15.000,00 — penulisan ini benar?",ans:true},
{q:"Jalan Anggrek No. 10 — penulisan ini benar?",ans:true},
{q:"'lima meter' adalah penulisan angka yang benar?",ans:false},
{q:"12 kilogram — penulisan ini benar?",ans:true},
{q:"'dua belas ribu rupiah' adalah penulisan angka yang benar?",ans:false},
];
const fillQuestions=[
{q:"Ibu membeli gula ___ kilogram",ans:"2"},
{q:"Harga gula tersebut ___",ans:"Rp10.000,00"},
{q:"Rumah ibu di Jalan Kenanga No. ___",ans:"7"},
];
const readingText=`"Siti akan pergi ke Bandung untuk mengunjungi neneknya. Ia berangkat naik kereta pukul 08.00 pagi dari Stasiun Jakarta. Kereta tiba di Bandung pukul 11.00 siang."`;
const readingQuestions=[
{q:"Apa tujuan perjalanan Siti?",opts:["Liburan ke pantai","Mengunjungi neneknya"],ans:1},
{q:"Siti berangkat pukul …",opts:["08.00","11.00"],ans:0},
{q:"Siti naik apa?",opts:["Bus","Kereta"],ans:1},
{q:"Berapa lama perjalanan Siti?",opts:["3 jam","2 jam"],ans:0},
{q:"Siti berangkat dari mana?",opts:["Bandung","Jakarta"],ans:1},
];

let allQuestions=[];
function buildQuestionPool(){
allQuestions=[];
mcQuestions.forEach(q=>allQuestions.push({type:'mc',...q}));
tfQuestions.forEach(q=>allQuestions.push({type:'tf',...q}));
fillQuestions.forEach(q=>allQuestions.push({type:'fill',...q}));
readingQuestions.forEach(q=>allQuestions.push({type:'reading',...q}));
shuffle(allQuestions);
}
let qIdx=0;
function getNextQuestion(){
if(qIdx>=allQuestions.length){shuffle(allQuestions);qIdx=0}
return allQuestions[qIdx++];
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}

// ===== GAME STATE =====
let positions=Array(PLAYERS).fill(0); // 0=not started, 1-30=on board
let scores=Array(PLAYERS).fill(0);
let currentPlayer=0;
let isRolling=false;
let gameOver=false;

// ===== BUILD BOARD =====
function buildBoard(){
const board=document.getElementById('board');
board.innerHTML='';
// Board layout: row 0(top) is cells 25-30, row 4(bottom) is cells 1-6
// Zigzag: even rows(from bottom) L->R, odd rows R->L
const cells=[];
for(let row=4;row>=0;row--){
const rowCells=[];
const startNum=row*6; // 0-based row from bottom
for(let col=0;col<6;col++){
const fromBottom=4-row;
let num;
if(fromBottom%2===0) num=fromBottom*6+col+1;
else num=fromBottom*6+(5-col)+1;
rowCells.push(num);
}
cells.push(...rowCells);
}
cells.forEach(num=>{
const div=document.createElement('div');
div.className='board-cell';
div.id='cell-'+num;
div.dataset.num=num;
let bg=CELL_COLORS[(num-1)%CELL_COLORS.length];
if(num===1){div.classList.add('cell-start');bg=''}
else if(num===30){div.classList.add('cell-finish');bg=''}
else if(SNAKES[num]){div.classList.add('cell-snake');bg=''}
else if(LADDERS[num]){div.classList.add('cell-ladder');bg=''}
if(bg)div.style.background=bg;
div.innerHTML=`<span>${num}</span>`;
if(SNAKES[num])div.innerHTML+=`<span class="snake-icon">🐍</span>`;
if(LADDERS[num])div.innerHTML+=`<span class="ladder-icon">🪜</span>`;
board.appendChild(div);
});
}

function buildScoreBoard(){
const sb=document.getElementById('scoreBoard');
sb.innerHTML='';
for(let i=0;i<PLAYERS;i++){
const div=document.createElement('div');
div.className='score-card';
div.id='score-'+i;
div.style.borderColor=COLORS[i];
div.innerHTML=`<span style="font-size:20px">${EMOJIS[i]}</span>
<span class="font-bold" style="color:${COLORS[i]}">${NAMES[i]}</span>
<span class="ml-auto font-extrabold" id="pts-${i}">0</span>⭐`;
sb.appendChild(div);
}
updateActivePlayer();
}

function updateActivePlayer(){
for(let i=0;i<PLAYERS;i++){
const el=document.getElementById('score-'+i);
el.classList.toggle('active-player',i===currentPlayer);
if(i===currentPlayer)el.style.borderColor=COLORS[i];
}
document.getElementById('turnLabel').textContent=`Giliran: ${EMOJIS[currentPlayer]} ${NAMES[currentPlayer]}`;
document.getElementById('turnLabel').style.color=COLORS[currentPlayer];
}

// ===== PION RENDERING =====
function renderPions(){
// Remove old pions
document.querySelectorAll('.pion').forEach(p=>p.remove());
// Group by position
const groups={};
positions.forEach((pos,i)=>{
if(pos<1)return;
if(!groups[pos])groups[pos]=[];
groups[pos].push(i);
});
Object.entries(groups).forEach(([pos,players])=>{
const cell=document.getElementById('cell-'+pos);
if(!cell)return;
players.forEach((pi,idx)=>{
const pion=document.createElement('div');
pion.className='pion';
if(pi===currentPlayer&&!gameOver)pion.classList.add('active-pion');
pion.style.background=COLORS[pi];
pion.textContent=EMOJIS[pi];
// Offset multiple pions
const offsets=[[-30,-30],[-30,30],[30,-30],[30,30],[0,0]];
const ox=players.length>1?offsets[idx][0]*0.3:0;
const oy=players.length>1?offsets[idx][1]*0.3:0;
pion.style.transform=`translate(${ox}px,${oy}px)`;
cell.appendChild(pion);
});
});
}

// ===== DICE =====
async function rollDice(){
if(isRolling||gameOver)return;
isRolling=true;
try{audioCtx.resume()}catch(e){}
if(!bgInterval)startBgMusic();
const dice=document.getElementById('diceBtn');
sfxDice();
dice.classList.add('rolling');
const value=Math.floor(Math.random()*6)+1;
const faces=['⚀','⚁','⚂','⚃','⚄','⚅'];
await wait(600);
dice.classList.remove('rolling');
dice.textContent=faces[value-1];
document.getElementById('diceResult').textContent=`🎲 Angka: ${value}`;

// Move pion
let pos=positions[currentPlayer];
if(pos===0)pos=0;
let target=pos+value;
if(target>30)target=30; // can't go past

// Animate step by step
for(let step=pos+1;step<=target;step++){
positions[currentPlayer]=step;
renderPions();
sfxStep();
await wait(250);
}

// Show question
await showQuestion(target);
}

async function showQuestion(landedPos){
const q=getNextQuestion();
const modal=document.getElementById('questionModal');
const box=document.getElementById('questionBox');

let html=`<p class="text-sm font-bold mb-1" style="color:${COLORS[currentPlayer]}">${EMOJIS[currentPlayer]} ${NAMES[currentPlayer]} — Kotak ${landedPos}</p>`;

if(q.type==='mc'){
html+=`<h3 class="fredoka text-lg mb-3">${q.q}</h3><div class="flex flex-col gap-2">`;
const shuffled=[0,1];if(Math.random()>.5)shuffled.reverse();
shuffled.forEach(i=>{
html+=`<button class="btn-answer" onclick="answerMC(this,${i},${q.ans},${landedPos})">${String.fromCharCode(97+i)}) ${q.opts[i]}</button>`;
});
html+=`</div>`;
} else if(q.type==='tf'){
html+=`<h3 class="fredoka text-lg mb-3">${q.q}</h3><div class="flex gap-3 justify-center">`;
html+=`<button class="btn-answer" style="width:auto;padding:10px 30px;text-align:center" onclick="answerTF(this,true,${q.ans},${landedPos})">✅ Benar</button>`;
html+=`<button class="btn-answer" style="width:auto;padding:10px 30px;text-align:center" onclick="answerTF(this,false,${q.ans},${landedPos})">❌ Salah</button>`;
html+=`</div>`;
} else if(q.type==='fill'){
html+=`<h3 class="fredoka text-lg mb-3">${q.q}</h3>`;
html+=`<input class="input-answer" id="fillInput" placeholder="Ketik jawaban..." onkeydown="if(event.key==='Enter')checkFill('${q.ans.replace(/'/g,"\\'")}',${landedPos})">`;
html+=`<button class="btn-answer mt-2" style="text-align:center;background:#3498db;color:#fff;border-color:#3498db" onclick="checkFill('${q.ans.replace(/'/g,"\\'")}',${landedPos})">Jawab!</button>`;
} else if(q.type==='reading'){
html+=`<div class="reading-box">${readingText}</div>`;
html+=`<h3 class="fredoka text-base mb-3">${q.q}</h3><div class="flex flex-col gap-2">`;
const shuffled=[0,1];if(Math.random()>.5)shuffled.reverse();
shuffled.forEach(i=>{
html+=`<button class="btn-answer" onclick="answerMC(this,${i},${q.ans},${landedPos})">${String.fromCharCode(97+i)}) ${q.opts[i]}</button>`;
});
html+=`</div>`;
}

box.innerHTML=html;
modal.classList.add('show');
}

function answerMC(el,chosen,correct,pos){
const btns=el.parentElement.querySelectorAll('.btn-answer');
btns.forEach(b=>b.onclick=null);
if(chosen===correct){onCorrect(el,pos)}else{
el.classList.add('wrong');
btns.forEach(b=>{if(b!==el)b.classList.add('correct')});// show correct
onWrong(pos);
}
}
function answerTF(el,chosen,correct,pos){
const btns=el.parentElement.querySelectorAll('.btn-answer');
btns.forEach(b=>b.onclick=null);
if(chosen===correct){onCorrect(el,pos)}else{
el.classList.add('wrong');
onWrong(pos);
}
}
function checkFill(correct,pos){
const input=document.getElementById('fillInput');
if(!input)return;
const val=input.value.trim();
const btn=input.nextElementSibling;
if(!btn)return;
input.disabled=true;btn.onclick=null;
if(val===correct){onCorrect(btn,pos)}else{
btn.classList.add('wrong');
input.style.borderColor='#e74c3c';
showToast(`Jawaban benar: ${correct}`,'#e74c3c');
onWrong(pos);
}
}

async function onCorrect(el,pos){
el.classList.add('correct');
sfxCorrect();
scores[currentPlayer]+=10;
document.getElementById('pts-'+currentPlayer).textContent=scores[currentPlayer];
spawnStars(el);
showToast('✅ Benar! +10 poin','#2ecc71');
await wait(1200);
await checkSnakeLadder(pos);
}
async function onWrong(pos){
sfxWrong();
showToast('❌ Salah! 0 poin','#e74c3c');
await wait(1200);
await checkSnakeLadder(pos);
}

async function checkSnakeLadder(pos){
document.getElementById('questionModal').classList.remove('show');
if(LADDERS[pos]){
showToast('🪜 Naik tangga!','#27ae60');
sfxLadder();
await wait(400);
const target=LADDERS[pos];
for(let s=po
